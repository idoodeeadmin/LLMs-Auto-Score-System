version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - uploads_data:/app/uploads
    restart: always

  socket:
    build:
      context: .
      dockerfile: server-node/Dockerfile
    ports:
      - "3001:3001"
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
      - socket
    restart: always

volumes:
  uploads_data:

[build]
  command = "pnpm build"
  publish = "dist/spa"

[[redirects]]
  from = "/api/*"
  to = "https://YOUR_RENDER_API_URL/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/socket.io/*"
  to = "https://YOUR_RENDER_SOCKET_URL/socket.io/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200



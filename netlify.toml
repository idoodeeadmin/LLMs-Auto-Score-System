[build]
  command = "pnpm build"
  publish = "dist/spa"

[[redirects]]
  from = "/api/*"
  to = "https://llms-auto-score-system.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/socket.io/*"
  to = "https://llms-auto-score-system-socket.onrender.com/socket.io/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200


